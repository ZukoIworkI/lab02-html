<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контакти</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-flex">
            <div class="logo">МійСайт</div>
            <nav>
                <ul class="nav-list">
                    <li><a href="../index.html">Головна</a></li>
                    <li><a href="about.html">Про мене</a></li>
                    <li><a href="contact.html" class="active">Контакти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-container">
            <h2>Зворотній зв'язок</h2>
            <form>
                <div class="form-group">
                    <label for="name">Ваше ім'я:</label>
                    <input type="text" id="name" required placeholder="Введіть ім'я">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Ціль звернення:</label>
                    <select>
                        <option>Запитання</option>
                        <option>Пропозиція</option>
                    </select>
                </div>
                <button type="submit">Відправити</button>
            </form>
        </section>
    </main>
</body>
</html>
